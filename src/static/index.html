<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>skycam</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  img { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: contain; }
</style>
<img id="frame" src="latest.jpg" alt="latest sky frame">
<script>
  const frame = document.getElementById("frame");
  const refresh = () => { frame.src = "latest.jpg?t=" + Date.now(); };

  // Live update via the "new frame" WebSocket; reconnect with backoff.
  let backoff = 1000;
  function connect() {
    const scheme = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(scheme + "://" + location.host + "/ws");
    ws.onopen = () => { backoff = 1000; };
    ws.onmessage = (ev) => {
      let type; try { type = JSON.parse(ev.data).type; } catch (e) {}
      if (type === "imageUpdate") refresh();
    };
    ws.onerror = () => ws.close();
    ws.onclose = () => {
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 30000);
    };
  }
  connect();

  // Fallback refresh in case the socket is unavailable.
  setInterval(refresh, 30000);
</script>
</html>
